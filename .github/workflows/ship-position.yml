name: Update ship position

on:
  schedule:
    - cron: "5 0,12 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ship-position
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/fetch-ship-position.ts
        env:
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
      - name: Commit if changed
        run: |
          if git diff --quiet -- public/ship-position.json; then
            echo "No change in ship position file"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/ship-position.json
          git commit -m "Update Crown Princess position"
          git push
